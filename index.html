<!DOCTYPE html>

<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>tudo por você ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      color: white;
      text-align: center;
    }

    .envelope {
      width: 250px;
      height: 150px;
      background: #ff4d6d;
      margin: 150px auto;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2em;
      cursor: pointer;
      transition: 0.5s;
    }

    .envelope:hover {
      transform: scale(1.1);
    }

    .aberto {
      animation: abrir 1s forwards;
    }

    @keyframes abrir {
      0% { transform: scaleY(1); }
      100% { transform: scaleY(0); opacity: 0; }
    }

    .container {
      padding: 40px;
      display: none;
    }

    img {
      width: 250px;
      border-radius: 20px;
      margin-top: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    button {
      margin-top: 30px;
      padding: 15px 25px;
      border: none;
      border-radius: 30px;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    .hidden {
      display: none;
      margin-top: 20px;
      animation: fade 1s;
    }

    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .galeria {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }

    .galeria img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 15px;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
        opacity: 0;
      }
    }

    /* NOME E CONTADOR 💖 */
    #nome {
      font-size: 2em;
      margin-top: 10px;
      animation: aparecer 2s;
    }

    #tempoJuntos {
      margin-top: 10px;
      font-size: 1.1em;
      opacity: 0.9;
    }

    @keyframes aparecer {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

</head>

<body>

<div class="envelope" onclick="abrirCarta()">
  💌 Abra quando estiver sozinho
</div>

<div class="container" id="conteudo">

  <h1>oiiii meu amorzinho lindo</h1>

  <!-- NOME -->

  <h2 id="nome">meu Nicolas fofinho</h2>

  <!-- CONTADOR -->

  <p id="tempoJuntos"></p>

  <p>
    Eu fiz esse site só pra te lembrar o quanto você é especial pra mim 💖
  </p>

<button onclick="mostrarTudo()">Clique aqui 💌</button>

  <div id="surpresa" class="hidden">


<img src="foto.jpg">

<div class="galeria">
  <img src="foto1.jpg">
  <img src="foto2.jpg">
  <img src="foto3.jpg">
  <img src="foto4.jpg">
</div>

<p style="margin-top:20px;">
  Eu te amo mais do que tudo amor, eu te amo infinito 💕
</p>


  </div>

</div>

<script>
function abrirCarta() {
  const envelope = document.querySelector(".envelope");
  envelope.classList.add("aberto");

  setTimeout(() => {
    envelope.style.display = "none";
    document.getElementById("conteudo").style.display = "block";
  }, 1000);
}

function mostrarTudo() {
  const surpresa = document.getElementById("surpresa");
  surpresa.style.display = "block";

  setInterval(() => {
    const heart = document.createElement("div");
    heart.innerHTML = "💖";
    heart.style.position = "fixed";
    heart.style.top = "0";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = "20px";
    heart.style.animation = "fall 3s linear";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
  }, 300);
}

/* CONTADOR 💝 */
function atualizarTempo() {
  const inicio = new Date("2025-09-02"); // 

  const agora = new Date();
  const diff = agora - inicio;

  const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
  const horas = Math.floor((diff / (1000 * 60 * 60)) % 24);

  document.getElementById("tempoJuntos").innerHTML =
    `juntinhos desde ${dias} dias e ${horas} horas 💕`;
}

setInterval(atualizarTempo, 1000);
atualizarTempo();
</script>

</body>
</html>
