<!DOCTYPE html>

<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>tudo por voce ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      color: #fff;
      text-align: center;
    }

    .container {
      padding: 40px;
    }

    h1 {
      font-size: 3em;
    }

    p {
      font-size: 1.2em;
      max-width: 600px;
      margin: auto;
    }

    img {
      width: 250px;
      border-radius: 20px;
      margin-top: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    button {
      margin-top: 30px;
      padding: 15px 25px;
      border: none;
      border-radius: 30px;
      background: #ff4d6d;
      color: white;
      font-size: 1em;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff1e4d;
    }

    .hidden {
      display: none;
      margin-top: 20px;
      animation: fade 1s;
    }

    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .galeria {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }

    .galeria img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 15px;
      transition: 0.3s;
    }

    .galeria img:hover {
      transform: scale(1.1);
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
        opacity: 0;
      }
    }
  </style>

</head>

<body>

  <div class="container">
    <h1>Oi, meu amor ❤️ </h1>

  </div>

  <script>
    function mostrarTudo() {
      const surpresa = document.getElementById("surpresa");
      surpresa.style.display = "block";

      document.getElementById("musica").play();

      // corações 💗
      setInterval(() => {
        const heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.style.position = "fixed";
        heart.style.top = "0";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = "20px";
        heart.style.animation = "fall 3s linear";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 3000);
