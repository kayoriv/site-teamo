<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pra Você ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      color: #fff;
      text-align: center;
    }

    .container {
      padding: 40px;
    }

    h1 {
      font-size: 3em;
    }

    p {
      font-size: 1.2em;
      max-width: 600px;
      margin: auto;
    }

    img {
      width: 250px;
      border-radius: 20px;
      margin-top: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    button {
      margin-top: 30px;
      padding: 15px 25px;
      border: none;
      border-radius: 30px;
      background: #ff4d6d;
      color: white;
      font-size: 1em;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff1e4d;
    }

    .hidden {
      display: none;
      margin-top: 20px;
      font-size: 1.3em;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Oi, meu amor 💖</h1>

    <p>
      Eu fiz esse site só pra te lembrar o quanto você é especial pra mim.
      Cada momento com você é único e eu sou muito feliz por ter você ❤️
    </p>

    <img src="foto.jpg" alt="Nós dois">

    <br>

    <button onclick="mostrarMensagem()">Clique aqui 💌</button>

    <div id="mensagem" class="hidden">
      Eu te amo mais do que palavras conseguem explicar 💖✨
    </div>
  </div>

  <script>
    function mostrarMensagem() {
      document.getElementById("mensagem").style.display = "block";
    }
  </script>

</body>
</html>
